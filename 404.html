<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        .scene {
            perspective: 1000px;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .container {
            text-align: center;
            z-index: 10;
            transform-style: preserve-3d;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotateX(0deg); }
            50% { transform: translateY(-20px) rotateX(5deg); }
        }
        .error-code {
            font-size: 15rem;
            font-weight: 900;
            color: transparent;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 20px rgba(255, 0, 128, 0.8), 0 0 40px rgba(255, 0, 128, 0.6), 0 0 60px rgba(255, 0, 128, 0.4);
            animation: glitch 2s infinite, pulse-glow 3s ease-in-out infinite alternate;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .error-code:hover {
            transform: scale(1.05) rotateY(10deg);
            text-shadow: 0 0 30px rgba(255, 0, 128, 1), 0 0 60px rgba(255, 0, 128, 0.8), 0 0 90px rgba(255, 0, 128, 0.6), 0 0 120px rgba(255, 0, 128, 0.4);
        }
        .error-code::before, .error-code::after {
            content: '404';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }
        .error-code::before {
            color: #ff0080;
            animation: glitch-top 2s infinite linear alternate-reverse;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-2px, -2px);
            opacity: 0.8;
        }
        .error-code::after {
            color: #00ffff;
            animation: glitch-bottom 2s infinite linear alternate-reverse;
            clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
            transform: translate(2px, 2px);
            opacity: 0.8;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        @keyframes glitch-top {
            0% { transform: translate(0); }
            25% { transform: translate(-3px, 3px); }
            50% { transform: translate(3px, -3px); }
            75% { transform: translate(-3px, -3px); }
            100% { transform: translate(3px, 3px); }
        }
        @keyframes glitch-bottom {
            0% { transform: translate(0); }
            25% { transform: translate(3px, -3px); }
            50% { transform: translate(-3px, 3px); }
            75% { transform: translate(3px, 3px); }
            100% { transform: translate(-3px, -3px); }
        }
        @keyframes pulse-glow { 0% { filter: brightness(1); } 100% { filter: brightness(1.3); } }
        .message {
            font-size: 2rem;
            color: #fff;
            margin: 2rem 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: fadeInUp 1s ease-out 0.5s both;
        }
        .description {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 3rem;
            max-width: 600px;
            line-height: 1.6;
            animation: fadeInUp 1s ease-out 0.8s both;
        }
        .btn {
            display: inline-block;
            padding: 1rem 3rem;
            background: linear-gradient(45deg, #ff0080, #00ffff, #ff0080);
            background-size: 200% 200%;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 128, 0.5);
            animation: fadeInUp 1s ease-out 1.1s both, gradient-shift 3s ease infinite;
            cursor: pointer;
            border: none;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 40px rgba(255, 0, 128, 0.8);
        }
        .btn::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        @keyframes gradient-shift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .stars {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }
        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .shooting-star {
            position: absolute;
            width: 4px; height: 4px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            animation: shoot var(--shoot-duration) linear infinite;
            opacity: 0;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100px; height: 2px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0.8), transparent);
            transform: translateX(100%);
        }
        @keyframes shoot {
            0% { transform: translate(0, 0) rotate(45deg); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(45deg); opacity: 0; }
        }
        .nebula {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 0, 128, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(138, 43, 226, 0.1) 0%, transparent 70%);
            z-index: 0;
            animation: nebula-pulse 8s ease-in-out infinite;
        }
        @keyframes nebula-pulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            animation: rise var(--rise-duration) ease-in infinite;
            opacity: 0;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: var(--max-opacity); }
            90% { opacity: var(--max-opacity); }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }
        .robot {
            font-size: 4rem;
            margin: 2rem 0;
            display: inline-block;
            animation: robot-bounce 2s ease-in-out infinite;
            cursor: pointer;
            transition: all 0.3s ease;
            filter: drop-shadow(0 0 20px rgba(0, 255, 255, 0.6));
        }
        .robot:hover {
            transform: scale(1.2) rotate(10deg);
            filter: drop-shadow(0 0 30px rgba(0, 255, 255, 0.8));
        }
        @keyframes robot-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .robot.clicked { animation: robot-spin 0.5s ease-in-out; }
        @keyframes robot-spin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.3); }
            100% { transform: rotate(360deg) scale(1); }
        }
        @media (max-width: 768px) {
            .error-code { font-size: 8rem; }
            .message { font-size: 1.5rem; }
            .description { font-size: 1rem; padding: 0 1rem; }
            .robot { font-size: 3rem; }
        }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .message { font-size: 1.2rem; }
            .btn { padding: 0.8rem 2rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="nebula"></div>
    <div class="stars" id="stars"></div>
    <div class="scene">
        <div class="container" id="container">
            <div class="robot" id="robot">🤖</div>
            <div class="error-code" id="error-code">404</div>
            <h1 class="message">Упс! Страница потерялась в космосе</h1>
            <p class="description">Похоже, вы зашли слишком далеко. Эта страница была поглощена чёрной дырой или просто никогда не существовала. Не волнуйтесь, наш робот уже вылетает на поиски!</p>
            <a href="/" class="btn">Вернуться на Землю</a>
        </div>
    </div>
    <script>
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = Math.random() * 3 + 1 + 'px';
            star.style.height = star.style.width;
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--opacity', Math.random() * 0.5 + 0.3);
            starsContainer.appendChild(star);
        }
        function createShootingStar() {
            const shootingStar = document.createElement('div');
            shootingStar.className = 'shooting-star';
            shootingStar.style.left = Math.random() * 100 + '%';
            shootingStar.style.top = Math.random() * 30 + '%';
            shootingStar.style.setProperty('--tx', (Math.random() * 200 + 100) + 'px');
            shootingStar.style.setProperty('--ty', (Math.random() * 200 + 100) + 'px');
            shootingStar.style.setProperty('--shoot-duration', (Math.random() * 2 + 1) + 's');
            starsContainer.appendChild(shootingStar);
            setTimeout(() => shootingStar.remove(), 3000);
        }
        setInterval(createShootingStar, 2000);
        const particleColors = ['#ff0080', '#00ffff', '#8a2be2', '#ffffff'];
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.bottom = '-10px';
            particle.style.width = Math.random() * 6 + 2 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
            particle.style.boxShadow = '0 0 ' + (Math.random() * 10 + 5) + 'px ' + particle.style.background;
            particle.style.setProperty('--rise-duration', (Math.random() * 5 + 3) + 's');
            particle.style.setProperty('--max-opacity', Math.random() * 0.6 + 0.4);
            document.body.appendChild(particle);
            setTimeout(() => particle.remove(), 8000);
        }
        setInterval(createParticle, 300);
        const container = document.getElementById('container');
        const scene = document.querySelector('.scene');
        scene.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            container.style.transform = 'rotateY(' + xAxis + 'deg) rotateX(' + yAxis + 'deg)';
        });
        scene.addEventListener('mouseleave', () => {
            container.style.transform = 'rotateY(0deg) rotateX(0deg)';
        });
        const robot = document.getElementById('robot');
        const errorCodes = ['404', '🚀', '⭐', '🌟', '💫', '🛸', '👽', '🪐'];
        let clickCount = 0;
        robot.addEventListener('click', () => {
            clickCount++;
            robot.classList.add('clicked');
            if (clickCount % 3 === 0) {
                document.getElementById('error-code').textContent = errorCodes[Math.floor(Math.random() * errorCodes.length)];
                setTimeout(() => { document.getElementById('error-code').textContent = '404'; }, 1000);
            }
            setTimeout(() => robot.classList.remove('clicked'), 500);
        });
        const errorCode = document.getElementById('error-code');
        errorCode.addEventListener('click', () => {
            errorCode.style.animation = 'none';
            errorCode.offsetHeight;
            errorCode.style.animation = 'glitch 0.5s infinite, pulse-glow 1s ease-in-out infinite alternate';
            setTimeout(() => { errorCode.style.animation = 'glitch 2s infinite, pulse-glow 3s ease-in-out infinite alternate'; }, 2000);
        });
        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.width = (Math.random() * 8 + 4) + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
                particle.style.borderRadius = '50%';
                particle.style.pointerEvents = 'none';
                particle.style.zIndex = '1000';
                particle.style.boxShadow = '0 0 10px ' + particle.style.background;
                document.body.appendChild(particle);
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                particle.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: 'translate(' + tx + 'px, ' + ty + 'px) scale(0)', opacity: 0 }
                ], { duration: 1000, easing: 'ease-out' }).onfinish = () => particle.remove();
            }
        }
        document.addEventListener('click', (e) => { createExplosion(e.clientX, e.clientY); });
    </script>
</body>
</html>
