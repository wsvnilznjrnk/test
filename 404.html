<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Страница не найдена</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            color: #fff;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 2rem;
            max-width: 800px;
        }

        .error-code {
            font-size: 15rem;
            font-weight: 900;
            background: linear-gradient(45deg, #ff00cc, #3333ff, #00ffff, #ff00cc);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradientShift 3s ease infinite, float 6s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 0, 204, 0.5);
            position: relative;
            line-height: 1;
            margin-bottom: 1rem;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(2deg); }
            66% { transform: translateY(10px) rotate(-2deg); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(90deg, #fff, #a0a0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2.5rem;
            color: #c0c0ff;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            background: linear-gradient(45deg, #ff00cc, #3333ff);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 0, 204, 0.4);
            position: relative;
            overflow: hidden;
            border: none;
            cursor: pointer;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 0, 204, 0.6);
        }

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
            animation: rise linear infinite;
        }

        @keyframes rise {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        .glitch {
            position: relative;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00cc;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00ffff;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            5% { clip: rect(70px, 9999px, 11px, 0); }
            10% { clip: rect(22px, 9999px, 6px, 0); }
            15% { clip: rect(84px, 9999px, 97px, 0); }
            20% { clip: rect(2px, 9999px, 56px, 0); }
            25% { clip: rect(65px, 9999px, 16px, 0); }
            30% { clip: rect(88px, 9999px, 4px, 0); }
            35% { clip: rect(15px, 9999px, 86px, 0); }
            40% { clip: rect(3px, 9999px, 41px, 0); }
            45% { clip: rect(79px, 9999px, 28px, 0); }
            50% { clip: rect(24px, 9999px, 64px, 0); }
            55% { clip: rect(57px, 9999px, 9px, 0); }
            60% { clip: rect(92px, 9999px, 33px, 0); }
            65% { clip: rect(11px, 9999px, 78px, 0); }
            70% { clip: rect(46px, 9999px, 2px, 0); }
            75% { clip: rect(68px, 9999px, 51px, 0); }
            80% { clip: rect(35px, 9999px, 89px, 0); }
            85% { clip: rect(7px, 9999px, 23px, 0); }
            90% { clip: rect(81px, 9999px, 66px, 0); }
            95% { clip: rect(19px, 9999px, 48px, 0); }
            100% { clip: rect(53px, 9999px, 12px, 0); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); }
            5% { clip: rect(52px, 9999px, 39px, 0); }
            10% { clip: rect(79px, 9999px, 86px, 0); }
            15% { clip: rect(17px, 9999px, 14px, 0); }
            20% { clip: rect(100px, 9999px, 6px, 0); }
            25% { clip: rect(4px, 9999px, 91px, 0); }
            30% { clip: rect(36px, 9999px, 58px, 0); }
            35% { clip: rect(83px, 9999px, 25px, 0); }
            40% { clip: rect(21px, 9999px, 73px, 0); }
            45% { clip: rect(58px, 9999px, 4px, 0); }
            50% { clip: rect(95px, 9999px, 47px, 0); }
            55% { clip: rect(12px, 9999px, 82px, 0); }
            60% { clip: rect(69px, 9999px, 31px, 0); }
            65% { clip: rect(42px, 9999px, 96px, 0); }
            70% { clip: rect(8px, 9999px, 53px, 0); }
            75% { clip: rect(76px, 9999px, 18px, 0); }
            80% { clip: rect(33px, 9999px, 64px, 0); }
            85% { clip: rect(90px, 9999px, 9px, 0); }
            90% { clip: rect(26px, 9999px, 77px, 0); }
            95% { clip: rect(61px, 9999px, 42px, 0); }
            100% { clip: rect(5px, 9999px, 88px, 0); }
        }

        .robot {
            font-size: 5rem;
            margin-bottom: 2rem;
            animation: robotFloat 3s ease-in-out infinite;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .robot:hover {
            transform: scale(1.1);
        }

        @keyframes robotFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        @media (max-width: 768px) {
            .error-code {
                font-size: 8rem;
            }
            h1 {
                font-size: 2rem;
            }
            p {
                font-size: 1rem;
            }
            .btn {
                padding: 0.8rem 2rem;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="container">
        <div class="robot">🤖</div>
        <div class="error-code glitch" data-text="404">404</div>
        <h1>Упс! Страница потерялась в космосе</h1>
        <p>Похоже, вы зашли слишком далеко. Страница, которую вы ищете, была поглощена черной дырой или просто не существует. Не волнуйтесь, даже лучшие исследователи иногда теряются!</p>
        <a href="/" class="btn">Вернуться на Землю</a>
    </div>

    <script>
        // Создание частиц
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 6 + 2;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                
                particle.style.left = `${Math.random() * 100}%`;
                
                const duration = Math.random() * 10 + 10;
                particle.style.animationDuration = `${duration}s`;
                
                const delay = Math.random() * 5;
                particle.style.animationDelay = `${delay}s`;
                
                particlesContainer.appendChild(particle);
            }
        }

        // Параллакс эффект для 404
        document.addEventListener('mousemove', (e) => {
            const error404 = document.querySelector('.error-code');
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            error404.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Инициализация
        createParticles();

        // Добавление интерактивности для робота
        const robot = document.querySelector('.robot');
        robot.addEventListener('click', () => {
            robot.style.animation = 'none';
            setTimeout(() => {
                robot.style.animation = 'robotFloat 3s ease-in-out infinite';
            }, 10);
            
            // Эффект тряски
            robot.style.transform = 'scale(1.2) rotate(10deg)';
            setTimeout(() => {
                robot.style.transform = 'scale(1) rotate(0deg)';
            }, 300);
        });
    </script>
</body>
</html>
